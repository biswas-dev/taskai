name: Deploy to Production

on:
  push:
    branches: [ production ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA)'
        required: true
        default: 'main'

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  deploy-production:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"

      - name: Deploy to Production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          DB_DRIVER: postgres
          DB_DSN: ${{ secrets.PRODUCTION_DB_DSN }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 31.97.102.48 >> ~/.ssh/known_hosts

          echo "🚀 Deploying TaskAI to Production..."

          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << ENDSSH
            set -ex
            echo "📂 Changing to source directory..."
            cd /home/ubuntu/taskai/source

            echo "📥 Fetching from origin..."
            git fetch origin

            echo "🔄 Resetting to commit: $COMMIT_SHA"
            git reset --hard "$COMMIT_SHA"

            echo "📂 Moving to parent directory..."
            cd ..

            echo "📌 Setting version info..."
            export VERSION="$VERSION"
            export GIT_COMMIT="$GIT_COMMIT"
            export BUILD_TIME="$BUILD_TIME"
            export DB_DRIVER="$DB_DRIVER"
            export DB_DSN="$DB_DSN"
            export JWT_SECRET="$JWT_SECRET"
            export ENV=production
            echo "Version: \$VERSION, Commit: \$GIT_COMMIT, Build Time: \$BUILD_TIME"
            echo "DB Driver: \$DB_DRIVER"

            echo "🔐 Login to Docker Hub..."
            echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin

            echo "🛑 Stopping containers..."
            docker compose down || true

            echo "🧹 Cleaning up Docker build cache and unused images..."
            docker builder prune -af || true
            docker image prune -af || true

            echo "🔨 Building containers..."
            docker compose build --build-arg VERSION="\$VERSION" --build-arg GIT_COMMIT="\$GIT_COMMIT" --build-arg BUILD_TIME="\$BUILD_TIME"

            echo "🚀 Starting containers..."
            docker compose up -d

            echo "⏳ Waiting for containers to be healthy..."
            sleep 15

            echo "📊 Container status:"
            docker compose ps
          ENDSSH

      - name: Capture container logs on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << 'ENDSSH'
            cd /home/ubuntu/taskai
            echo "=== Container status ==="
            docker compose ps -a
            echo ""
            echo "=== API container logs ==="
            docker compose logs --tail=100 api
            echo ""
            echo "=== All container logs ==="
            docker compose logs --tail=50
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://taskai.cc/api/health || exit 1
          echo "✅ Production deployed successfully"

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 31.97.102.48" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://taskai.cc" >> $GITHUB_STEP_SUMMARY
