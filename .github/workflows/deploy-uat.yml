name: Deploy to UAT

on:
  push:
    branches: [ uat ]
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  deploy-uat:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: uat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"

      - name: Deploy to UAT server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          DB_DRIVER: postgres
          DB_DSN: ${{ secrets.UAT_DB_DSN }}
          JWT_SECRET: ${{ secrets.UAT_JWT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 92.4.83.28 >> ~/.ssh/known_hosts

          echo "🚀 Deploying TaskAI to UAT..."

          ssh -i ~/.ssh/deploy_key ubuntu@92.4.83.28 << ENDSSH
            set -e
            cd /home/ubuntu/taskai-uat
            git fetch origin
            git reset --hard $COMMIT_SHA

            export VERSION='$VERSION'
            export GIT_COMMIT='$GIT_COMMIT'
            export BUILD_TIME='$BUILD_TIME'
            export TASKAI_API_PORT=38888
            export TASKAI_WEB_PORT=33333
            export DB_DRIVER='$DB_DRIVER'
            export DB_DSN='$DB_DSN'
            export JWT_SECRET='$JWT_SECRET'
            export ENV=uat

            # Login to Docker Hub to avoid rate limiting
            echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin

            # Ensure nginx has the /draw/ route BEFORE starting containers
            echo "Ensuring nginx /draw/ route..."
            chmod +x deployment/scripts/ensure-draw-route.sh
            sudo ./deployment/scripts/ensure-draw-route.sh uat.taskai.cc

            docker compose down || true
            echo "🧹 Cleaning up Docker build cache and unused images to free disk space..."
            docker builder prune -af || true
            docker image prune -af || true
            docker compose build --no-cache --build-arg VERSION="\$VERSION" --build-arg GIT_COMMIT="\$GIT_COMMIT" --build-arg BUILD_TIME="\$BUILD_TIME"
            docker compose up -d --force-recreate --remove-orphans
            sleep 15
            docker compose ps
          ENDSSH

      - name: Verify deployment
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sleep 10
          echo "Checking API health..."
          curl -f -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" https://uat.taskai.cc/api/health || exit 1

          echo "Checking go-draw canvas.js is up to date..."
          CANVAS_JS=$(curl -sL -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" -H "Cache-Control: no-cache" "https://uat.taskai.cc/draw/static/canvas.js?v=$(date +%s)")
          if echo "$CANVAS_JS" | grep -q 'isRotating'; then
            echo "✅ canvas.js contains rotation support"
          else
            echo "❌ canvas.js does NOT contain rotation support — stale content!"
            exit 1
          fi
          echo "✅ UAT deployed successfully"

      - name: Deployment summary
        run: |
          echo "## 🚀 UAT Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 92.4.83.28" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://uat.taskai.cc" >> $GITHUB_STEP_SUMMARY
