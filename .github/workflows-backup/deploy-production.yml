name: Deploy to Production

on:
  push:
    branches: [ production ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA)'
        required: true
        default: 'production'

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  deploy-production:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to Production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          DB_DRIVER: postgres
          DB_DSN: ${{ secrets.PRODUCTION_DB_DSN }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_GITHUB_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.PRODUCTION_GITHUB_CLIENT_SECRET }}
          LOGIN_GH_CLIENT_ID: ${{ secrets.PRODUCTION_LOGIN_GITHUB_CLIENT_ID }}
          LOGIN_GH_CLIENT_SECRET: ${{ secrets.PRODUCTION_LOGIN_GITHUB_CLIENT_SECRET }}
          OAUTH_STATE_SECRET: ${{ secrets.PRODUCTION_OAUTH_STATE_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PRODUCTION_GOOGLE_CLIENT_SECRET }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.PRODUCTION_BACKUP_ENCRYPTION_KEY }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          APP_URL: https://taskai.cc
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 31.97.102.48 >> ~/.ssh/known_hosts

          echo "🚀 Deploying TaskAI to Production..."

          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << ENDSSH
            set -ex
            cd /home/ubuntu/taskai/source
            git fetch origin
            git reset --hard "$COMMIT_SHA"
            cd ..

            export VERSION="$VERSION"
            export GIT_COMMIT="$GIT_COMMIT"
            export BUILD_TIME="$BUILD_TIME"
            export DB_DRIVER="$DB_DRIVER"
            export DB_DSN="$DB_DSN"
            export JWT_SECRET="$JWT_SECRET"
            export APP_URL="$APP_URL"
            export OAUTH_SUCCESS_URL="https://taskai.cc/oauth/callback"
            export OAUTH_ERROR_URL="https://taskai.cc/login"
            export ENV=production

            if [ -n "$GH_OAUTH_CLIENT_ID" ] && [ "$GH_OAUTH_CLIENT_ID" != "-" ]; then
              export GITHUB_CLIENT_ID="$GH_OAUTH_CLIENT_ID"
              export GITHUB_CLIENT_SECRET="$GH_OAUTH_CLIENT_SECRET"
            fi
            export LOGIN_GITHUB_CLIENT_ID="$LOGIN_GH_CLIENT_ID"
            export LOGIN_GITHUB_CLIENT_SECRET="$LOGIN_GH_CLIENT_SECRET"
            export OAUTH_STATE_SECRET="$OAUTH_STATE_SECRET"
            export GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            export GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            if [ -n "$BACKUP_ENCRYPTION_KEY" ]; then
              export BACKUP_ENCRYPTION_KEY="$BACKUP_ENCRYPTION_KEY"
            fi
            if [ -n "$DD_API_KEY" ]; then
              export DD_API_KEY="$DD_API_KEY"
              export DD_SITE="${DD_SITE:-datadoghq.com}"
              export APM_ENABLED=true
              export DD_PROFILING_ENABLED=true
            fi

            # Login to Docker Hub
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            chmod +x source/deployment/scripts/ensure-draw-route.sh
            sudo source/deployment/scripts/ensure-draw-route.sh taskai.cc

            # Add zero-downtime nginx directives (error pages + upstream retry)
            chmod +x source/deployment/scripts/ensure-zero-downtime.sh
            sudo source/deployment/scripts/ensure-zero-downtime.sh taskai.cc

            # Ensure MCP nginx forwards X-Agent-Name header for AI attribution
            chmod +x source/deployment/scripts/ensure-mcp-agent-header.sh
            sudo source/deployment/scripts/ensure-mcp-agent-header.sh mcp.taskai.cc

            # Build new images while old containers are still running (zero-downtime)
            docker compose -f source/docker-compose.yml -p taskai build --build-arg VERSION="$VERSION" --build-arg GIT_COMMIT="$GIT_COMMIT" --build-arg BUILD_TIME="$BUILD_TIME"
            # Recreate containers with new images (stops old → starts new per-service)
            docker compose -f source/docker-compose.yml -p taskai up -d --force-recreate --remove-orphans
            # Clean up old images after new containers are running
            docker image prune -f || true
            sleep 15
            docker compose -f source/docker-compose.yml -p taskai ps
          ENDSSH

      - name: Capture container logs on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << 'ENDSSH'
            cd /home/ubuntu/taskai
            docker compose -f source/docker-compose.yml -p taskai ps -a
            docker compose -f source/docker-compose.yml -p taskai logs --tail=100 api
          ENDSSH

      - name: Verify deployment
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sleep 10
          curl -f -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" https://taskai.cc/api/health || exit 1

          CANVAS_JS=$(curl -sL -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" -H "Cache-Control: no-cache" "https://taskai.cc/draw/static/canvas.js?v=$(date +%s)")
          if echo "$CANVAS_JS" | grep -q 'isRotating'; then
            echo "✅ canvas.js contains rotation support"
          else
            echo "❌ canvas.js does NOT contain rotation support — stale content!"
            exit 1
          fi
          echo "✅ Production deployed successfully"

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 31.97.102.48" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://taskai.cc" >> $GITHUB_STEP_SUMMARY
