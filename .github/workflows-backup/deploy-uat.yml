name: Deploy to UAT

on:
  push:
    branches: [ uat ]
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  deploy-uat:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: uat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT

          echo "🏷️  Version: $VERSION"
          echo "📝 Commit: $GIT_COMMIT"
          echo "🕐 Build Time: $BUILD_TIME"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to UAT server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ steps.version.outputs.GIT_COMMIT }}
          BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          DB_DRIVER: postgres
          DB_DSN: ${{ secrets.UAT_DB_DSN }}
          JWT_SECRET: ${{ secrets.UAT_JWT_SECRET }}
          LOGIN_GH_CLIENT_ID: ${{ secrets.UAT_LOGIN_GITHUB_CLIENT_ID }}
          LOGIN_GH_CLIENT_SECRET: ${{ secrets.UAT_LOGIN_GITHUB_CLIENT_SECRET }}
          OAUTH_STATE_SECRET: ${{ secrets.UAT_OAUTH_STATE_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.UAT_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.UAT_GOOGLE_CLIENT_SECRET }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.UAT_BACKUP_ENCRYPTION_KEY }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          APP_URL: https://uat.taskai.cc
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 92.4.83.28 >> ~/.ssh/known_hosts

          echo "🚀 Deploying TaskAI to UAT..."

          ssh -i ~/.ssh/deploy_key ubuntu@92.4.83.28 << ENDSSH
            set -e
            cd /home/ubuntu/taskai-uat
            git fetch origin
            git reset --hard $COMMIT_SHA

            export VERSION='$VERSION'
            export GIT_COMMIT='$GIT_COMMIT'
            export BUILD_TIME='$BUILD_TIME'
            export TASKAI_API_PORT=38888
            export TASKAI_WEB_PORT=33333
            export DB_DRIVER='$DB_DRIVER'
            export DB_DSN='$DB_DSN'
            export JWT_SECRET='$JWT_SECRET'
            LOGIN_GH_ID='$LOGIN_GH_CLIENT_ID'
            LOGIN_GH_SECRET='$LOGIN_GH_CLIENT_SECRET'
            if [ -n "\$LOGIN_GH_ID" ] && [ "\$LOGIN_GH_ID" != "-" ]; then
              export LOGIN_GITHUB_CLIENT_ID="\$LOGIN_GH_ID"
              export LOGIN_GITHUB_CLIENT_SECRET="\$LOGIN_GH_SECRET"
            fi
            OAUTH_STATE='$OAUTH_STATE_SECRET'
            if [ -n "\$OAUTH_STATE" ]; then
              export OAUTH_STATE_SECRET="\$OAUTH_STATE"
            fi
            GOOGLE_ID='$GOOGLE_CLIENT_ID'
            if [ -n "\$GOOGLE_ID" ]; then
              export GOOGLE_CLIENT_ID="\$GOOGLE_ID"
              export GOOGLE_CLIENT_SECRET='$GOOGLE_CLIENT_SECRET'
            fi
            BACKUP_ENC_KEY='$BACKUP_ENCRYPTION_KEY'
            if [ -n "\$BACKUP_ENC_KEY" ]; then
              export BACKUP_ENCRYPTION_KEY="\$BACKUP_ENC_KEY"
            fi
            DD_KEY='$DD_API_KEY'
            if [ -n "\$DD_KEY" ]; then
              export DD_API_KEY="\$DD_KEY"
              export DD_SITE='${DD_SITE:-datadoghq.com}'
              export APM_ENABLED=true
            fi
            export APP_URL='https://uat.taskai.cc'
            export OAUTH_SUCCESS_URL='https://uat.taskai.cc/oauth/callback'
            export OAUTH_ERROR_URL='https://uat.taskai.cc/login'
            export ENV=uat

            # Login to Docker Hub to avoid rate limiting
            echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin

            chmod +x deployment/scripts/ensure-draw-route.sh
            sudo ./deployment/scripts/ensure-draw-route.sh uat.taskai.cc

            docker compose down || true
            docker builder prune -f || true
            docker image prune -f || true
            docker compose build --build-arg VERSION="\$VERSION" --build-arg GIT_COMMIT="\$GIT_COMMIT" --build-arg BUILD_TIME="\$BUILD_TIME"
            docker compose up -d --force-recreate --remove-orphans
            sleep 15
            docker compose ps
          ENDSSH

      - name: Verify deployment
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sleep 10
          curl -f -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" https://uat.taskai.cc/api/health || exit 1
          echo "✅ UAT deployed successfully"

      - name: Deployment summary
        run: |
          echo "## 🚀 UAT Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 92.4.83.28" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://uat.taskai.cc" >> $GITHUB_STEP_SUMMARY

  promote-to-production:
    needs: deploy-uat
    if: ${{ !contains(github.event.head_commit.message, '[skip-prod]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote UAT to Production
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          echo "Promoting $SHA to production..."

          # Temporarily enable force pushes on production branch
          gh api repos/${{ github.repository }}/branches/production/protection \
            -X PUT --input - <<'EOF'
          {"required_status_checks":{"strict":true,"contexts":[]},"enforce_admins":false,"required_pull_request_reviews":null,"restrictions":null,"allow_force_pushes":true,"required_linear_history":false}
          EOF

          # Force-push the UAT SHA to production branch
          git push --force origin ${SHA}:refs/heads/production

          # Re-lock production branch
          gh api repos/${{ github.repository }}/branches/production/protection \
            -X PUT --input - <<'EOF'
          {"required_status_checks":{"strict":true,"contexts":[]},"enforce_admins":false,"required_pull_request_reviews":null,"restrictions":null,"allow_force_pushes":false,"required_linear_history":false}
          EOF

          echo "Production deployment triggered from UAT ($SHA)"

      - name: Auto-promote summary
        run: |
          echo "## Auto-Promoted to Production" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** UAT deploy success" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitor:** https://github.com/${{ github.repository }}/actions" >> $GITHUB_STEP_SUMMARY
