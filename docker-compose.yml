services:
  # Standalone OpenTelemetry Collector — receives OTLP traces from the API and
  # exports directly to Datadog APM.
  #
  # The dd-agent's built-in OTLP ingest pipeline fails on cgroupv2 hosts.
  # This standalone collector has no such requirement and works on all kernels.
  #
  # To switch APM providers: replace the datadog exporter in otel-config.yaml
  # with a different OTLP-compatible backend — no application code changes needed.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: taskai-otel-collector
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
    networks:
      - taskai
    restart: unless-stopped

  dd-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: taskai-dd-agent
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      # APM port for native Datadog traces (OTLP goes via otel-collector above)
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      # Log collection from containers
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=false
      # Process and container monitoring
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_CONTAINER_EXCLUDE=name:taskai-dd-agent
      # DogStatsD for custom metrics
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_LOG_LEVEL=warn
      # Unified tags applied to all data sent by this agent
      - DD_ENV=${ENV:-production}
      - DD_SERVICE=taskai
      - DD_VERSION=${VERSION:-dev}
      # Exposed for postgres autodiscovery check (%%env_POSTGRES_PASSWORD%%)
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-taskai-dev-password}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /etc/passwd:/etc/passwd:ro
    privileged: true
    networks:
      - taskai
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - VERSION=${VERSION:-dev}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    ports:
      - "${TASKAI_API_PORT:-8083}:8080"
    environment:
      # Database config - postgres by default; SQLite is for tests only
      - DB_DRIVER=${DB_DRIVER:-postgres}
      - DB_PATH=/data/taskai.db
      - DB_DSN=${DB_DSN:-postgresql://taskai:taskai-dev-password@postgres:5432/taskai?sslmode=disable}
      # Postgres connection (when DB_DRIVER=postgres)
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-taskai}
      - POSTGRES_USER=${POSTGRES_USER:-taskai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-taskai-dev-password}
      # App config
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - PORT=8080
      - ENV=${ENV:-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://taskai.cc,https://staging.taskai.cc}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Yjs processor URL for wiki collaboration
      - YJS_PROCESSOR_URL=${YJS_PROCESSOR_URL:-http://yjs-processor:3001}
      # GitHub OAuth (repo sync)
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - APP_URL=${APP_URL:-http://localhost:5173}
      # OAuth login (Google + GitHub sign-in)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - LOGIN_GITHUB_CLIENT_ID=${LOGIN_GITHUB_CLIENT_ID:-}
      - LOGIN_GITHUB_CLIENT_SECRET=${LOGIN_GITHUB_CLIENT_SECRET:-}
      - OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET:-}
      - OAUTH_SUCCESS_URL=${OAUTH_SUCCESS_URL:-}
      - OAUTH_ERROR_URL=${OAUTH_ERROR_URL:-}
      # APM — set APM_ENABLED=true to activate tracing.
      # Change OTEL_EXPORTER_OTLP_ENDPOINT to switch providers (no code changes).
      - APM_ENABLED=${APM_ENABLED:-false}
      - OTEL_SERVICE_NAME=taskai
      - OTEL_SERVICE_VERSION=${VERSION:-dev}
      - OTEL_ENVIRONMENT=${ENV:-production}
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    labels:
      # Unified Service Tagging — links APM traces, logs, and infra metrics
      com.datadoghq.tags.service: "taskai"
      com.datadoghq.tags.env: "${ENV:-production}"
      com.datadoghq.tags.version: "${VERSION:-dev}"
      # Ship Go app logs to Datadog Logs
      com.datadoghq.ad.logs: '[{"source":"go","service":"taskai"}]'
    volumes:
      # Mount SQLite database for persistence
      - taskai-data:/data
    networks:
      - taskai
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      yjs-processor:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-taskai}
      - POSTGRES_USER=${POSTGRES_USER:-taskai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-taskai-dev-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - taskai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskai} -d ${POSTGRES_DB:-taskai}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      # Unified Service Tagging — links metrics, logs, and traces in Datadog
      com.datadoghq.tags.service: "taskai-postgres"
      com.datadoghq.tags.env: "${ENV:-production}"
      # Ship postgres logs to Datadog Logs
      com.datadoghq.ad.logs: '[{"source":"postgresql","service":"taskai-postgres"}]'
      # PostgreSQL integration — autodiscovered by the DD agent
      # Exposes query metrics, connection pool stats, replication lag, etc.
      com.datadoghq.ad.check_names: '["postgres"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"host":"%%host%%","port":5432,"username":"${POSTGRES_USER:-taskai}","password":"%%env_POSTGRES_PASSWORD%%","dbname":"${POSTGRES_DB:-taskai}","tags":["env:${ENV:-production}"]}]'

  yjs-processor:
    build:
      context: ./api/internal/yjs-processor
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3003:3001"
    environment:
      - PORT=3001
    networks:
      - taskai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
      args:
        - VERSION=${VERSION:-dev}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    ports:
      - "${TASKAI_WEB_PORT:-8084}:80"
    networks:
      - taskai
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    ports:
      - "8089:3000"
    environment:
      - TASKAI_API_URL=http://api:8080
      - PORT=3000
    networks:
      - taskai
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  # Persistent volume for SQLite database
  taskai-data:
    driver: local

  # Persistent volume for Postgres database
  postgres-data:
    driver: local

networks:
  taskai:
    driver: bridge
